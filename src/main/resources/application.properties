spring.application.name=Servicio-aulas
server.port=8082

# ===== Datasource MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/ServicioAulas?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=bas1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate (MySQL, no PostgreSQL) =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Lima

# ===== JWT =====
jwt.secret=4e6d2fdfef74954c3b3e58914ff47bb13714ed11454e7bc2aa50f60ea1737695a858a297871c8c5eb55e849e4f19473838133e8715704251db5d30bec3fd8a31
jwt.expiration-ms=3600000

# ===== Logging =====
logging.level.org.springframework.security=DEBUG
logging.level.com.aulas=DEBUG